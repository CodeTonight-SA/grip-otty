<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <defs>
    <clipPath id="r"><rect width="860" height="340" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="860" height="340" fill="#0d0c0a"/>

    <!-- ══ left: the pad (any editor) ══ -->
    <rect x="24" y="26" width="380" height="288" rx="10" fill="#161512" stroke="#2c2a25"/>
    <circle cx="46" cy="48" r="5" fill="#ff5f57"/><circle cx="64" cy="48" r="5" fill="#febc2e"/><circle cx="82" cy="48" r="5" fill="#28c840"/>
    <text x="214" y="52" fill="#8f8d86" font-size="12" text-anchor="middle">pad-1858.md — your editor</text>

    <text x="44" y="92" fill="#6b6963" font-size="12">#&gt; otty-pad → ★ p_19f2…4</text>

    <text x="44" y="128" fill="#e8e6df" font-size="14" opacity="0">explain why the watch loop
      <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.3s" fill="freeze"/>
    </text>
    <text x="44" y="150" fill="#e8e6df" font-size="14" opacity="0">only ships blocks ending in ---
      <animate attributeName="opacity" values="0;1" begin="1.4s" dur="0.3s" fill="freeze"/>
    </text>
    <text x="44" y="186" fill="#E8490F" font-size="14" font-weight="bold" opacity="0">---
      <animate attributeName="opacity" values="0;1" begin="2.2s" dur="0.2s" fill="freeze"/>
    </text>
    <rect x="42" y="204" width="120" height="24" rx="4" fill="#1f2d1f" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="2.8s" dur="0.25s" fill="freeze"/>
    </rect>
    <text x="52" y="220" fill="#63d178" font-size="12" opacity="0">saved  ⌁  sent
      <animate attributeName="opacity" values="0;1" begin="2.8s" dur="0.25s" fill="freeze"/>
    </text>
    <text x="44" y="256" fill="#6b6963" font-size="11" opacity="0">#&gt; ✓ 18:58:02 → p_19f2…4  58 chars
      <animate attributeName="opacity" values="0;1" begin="3.2s" dur="0.3s" fill="freeze"/>
    </text>

    <!-- ══ the wire ══ -->
    <line x1="404" y1="170" x2="456" y2="170" stroke="#3a3833" stroke-width="2"/>
    <circle r="4" fill="#E8490F" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.9;1" begin="3.0s" dur="0.9s" fill="freeze"/>
      <animateMotion path="M404,170 L456,170" begin="3.0s" dur="0.9s" fill="freeze"/>
    </circle>
    <text x="430" y="156" fill="#6b6963" font-size="10" text-anchor="middle">send-keys</text>

    <!-- ══ right: the agent pane ══ -->
    <rect x="456" y="26" width="380" height="288" rx="10" fill="#161512" stroke="#2c2a25"/>
    <text x="646" y="52" fill="#8f8d86" font-size="12" text-anchor="middle">Otty pane — Claude Code (or Codex, or OpenCode)</text>

    <text x="478" y="92" fill="#6b6963" font-size="13">&gt; _</text>
    <text x="478" y="92" fill="#e8e6df" font-size="13" opacity="0">&gt; explain why the watch loop only ships
      <animate attributeName="opacity" values="0;1" begin="3.9s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="492" y="112" fill="#e8e6df" font-size="13" opacity="0">blocks ending in ---
      <animate attributeName="opacity" values="0;1" begin="3.9s" dur="0.2s" fill="freeze"/>
    </text>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="4.4s" dur="0.3s" fill="freeze"/>
      <rect x="478" y="134" width="104" height="22" rx="4" fill="#26241f"/>
      <text x="490" y="149" fill="#E8490F" font-size="12">⠋ working…
        <animate attributeName="visibility" values="visible" begin="4.4s"/>
      </text>
    </g>
    <text x="478" y="186" fill="#b9b7ae" font-size="12" opacity="0">Because an autosave of a half-typed
      <animate attributeName="opacity" values="0;1" begin="5.4s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="478" y="204" fill="#b9b7ae" font-size="12" opacity="0">thought must never send: only text
      <animate attributeName="opacity" values="0;1" begin="5.8s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="478" y="222" fill="#b9b7ae" font-size="12" opacity="0">above a `---` line ships. …
      <animate attributeName="opacity" values="0;1" begin="6.2s" dur="0.4s" fill="freeze"/>
    </text>

    <!-- tab badge flips -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="6.9s" dur="0.3s" fill="freeze"/>
      <circle cx="820" cy="44" r="5" fill="#63d178"/>
      <text x="806" y="66" fill="#63d178" font-size="10" text-anchor="end">done</text>
    </g>

    <text x="430" y="330" fill="#4a4843" font-size="10" text-anchor="middle">illustration of one otty-pad --watch cycle — the real thing is your terminal</text>
  </g>
</svg>
